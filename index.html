<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefano Palazzo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
        }

        header {
            padding: 40px;
            text-align: center;
            background: #1e293b;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        section {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>
    <h1>Your Name</h1>
    <p>Developer | Designer | Your tagline</p>
</header>

<section>
    <div class="card">
        <h2>About Me</h2>
        <p>Write a short introduction about yourself.</p>
    </div>

    <div class="card">
        <h2>Projects</h2>
        <ul>
            <li><a href="#">Project 1</a></li>
            <li><a href="#">Project 2</a></li>
        </ul>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>Email: your@email.com</p>
    </div>
</section>

</body>
</html>
