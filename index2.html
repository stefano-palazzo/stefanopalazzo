<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stefano Palazzo</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: white;
    color: black;
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

nav .links a {
    margin-left: 20px;
    text-decoration: none;
    color: black;
    font-size: 0.9rem;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    text-align: center;
}

.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("https://images.unsplash.com/photo-1518770660439-4636190af475") center/cover;
    filter: blur(20px);
    z-index: -1;
}

.hero-content {
    max-width: 600px;
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

.hero p {
    color: #444;
}

/* PROJECTS */
.projects {
    padding: 100px 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
}

.card {
    background: #f5f5f5;
    padding: 30px;
    border-radius: 20px;
    transition: all 0.3s ease;
    opacity: 0;
    transform: translateY(40px);
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

.card:hover {
    transform: translateY(-5px);
}

/* FOOTER */
.footer {
    padding: 80px 20px;
    text-align: center;
}

.icons {
    display: flex;
    justify-content: center;
    gap: 30px;
}

.icons img {
    width: 30px;
    height: 30px;
    filter: grayscale(100%);
    transition: 0.3s;
}

.icons img:hover {
    filter: grayscale(0%);
}
</style>
</head>

<body>

<nav>
    <div><strong>Stefano Palazzo</strong></div>
    <div class="links">
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#links">Links</a>
    </div>
</nav>

<section class="hero" id="about">
    <div class="hero-content">
        <h1>Your Name</h1>
        <p>Short bio.</p>
    </div>
</section>

<section class="projects" id="projects">
    <div class="grid">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
        <div class="card">Project 4</div>
    </div>
</section>

<section class="footer" id="links">
    <h2>Find me</h2>
    <div class="icons">
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/25/25231.png"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    </div>
</section>

<script>
// fade-in on scroll
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
    const trigger = window.innerHeight * 0.85;

    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;

        if (top < trigger) {
            card.classList.add('show');
        }
    });
});
</script>

</body>
</html>
